services:
  postgres:
    image: postgres:16
    container_name: mcp-market-pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: mcp
      POSTGRES_PASSWORD: mcp
      POSTGRES_DB: mcpmarket
    ports:
      - '5433:5432'
    volumes:
      - mcp_pg:/var/lib/postgresql/data
volumes:
  mcp_pg:
