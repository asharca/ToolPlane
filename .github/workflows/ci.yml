name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  connector-cross-platform:
    name: connector (${{ matrix.os }})
    env:
      DATABASE_URL: postgresql://mcp:mcp@127.0.0.1:5432/toolplane
      AUTH_SECRET: connector-test-secret
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_TELEMETRY_DISABLED: 1
      CONNECTOR_INSTALL_SMOKE: 1
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.14.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm exec prisma generate

      - name: Test connector portability
        run: pnpm vitest run tests/unit/connector-cli.test.ts tests/unit/connector-auth.test.ts tests/unit/connector-bootstrap-route.test.ts tests/unit/connector-setup-token.test.ts tests/unit/spawn-spec.test.ts tests/unit/agent-skill-tools.test.ts tests/unit/sandbox.test.ts tests/integration/connector-broker.test.ts

      - name: Test Docker timeout cleanup
        if: matrix.os == 'ubuntu-latest'
        env:
          SANDBOX_DOCKER_SMOKE: 1
        run: pnpm vitest run tests/integration/sandbox-docker-timeout.live.test.ts

  validate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: mcp
          POSTGRES_PASSWORD: mcp
          POSTGRES_DB: toolplane
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mcp -d toolplane"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://mcp:mcp@127.0.0.1:5432/toolplane
      AUTH_SECRET: test-auth-secret
      NEXT_PUBLIC_APP_URL: ${{ vars.NEXT_PUBLIC_APP_URL || 'http://localhost:3000' }}
      NEXT_TELEMETRY_DISABLED: 1
      TOOLPLANE_VERSION: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.14.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm exec prisma generate

      - name: Push Prisma schema
        run: pnpm exec prisma db push

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
