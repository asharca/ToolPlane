services:
  postgres:
    image: postgres:16
    container_name: toolplane-pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: mcp
      POSTGRES_PASSWORD: mcp
      POSTGRES_DB: toolplane
    volumes:
      - mcp_pg:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U mcp -d toolplane']
      interval: 5s
      timeout: 5s
      retries: 10

  # Restricted Docker API proxy. The app launches one hardened container per
  # custom MCP. It never touches the raw socket directly — it talks to this
  # proxy over TCP, which only exposes the container/image/network endpoints needed.
  # The raw socket is mounted read-only into the proxy alone.
  socket-proxy:
    image: tecnativa/docker-socket-proxy:latest
    restart: unless-stopped
    environment:
      CONTAINERS: 1
      IMAGES: 1
      NETWORKS: 1
      POST: 1
      # everything else stays denied (no volumes/secrets/swarm/exec of host…)
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

  # The app. Coolify can still route to this service through its proxy; the
  # default host binding is http://localhost:10030 for direct deployments.
  app:
    image: ${TOOLPLANE_IMAGE:-ghcr.io/asharca/toolplane:latest}
    platform: ${TOOLPLANE_PLATFORM:-linux/amd64}
    ports:
      - '${APP_HOST_PORT:-10030}:3000'
    restart: unless-stopped
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'node -e "fetch(''http://127.0.0.1:3000/api/v1/health'').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"',
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      socket-proxy:
        condition: service_started
    environment:
      # Internal network → reach Postgres on 5432.
      DATABASE_URL: postgresql://mcp:mcp@postgres:5432/toolplane
      AUTH_SECRET: ${AUTH_SECRET:?set AUTH_SECRET in your environment or .env}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:10030}
      CONNECTOR_WS_BIND: 0.0.0.0
      CONNECTOR_WS_PORT: ${CONNECTOR_WS_PORT:-9321}
      CONNECTOR_WS_PUBLIC_URL: ${CONNECTOR_WS_PUBLIC_URL:-}
      # Reach the Docker daemon through the restricted proxy, not the raw socket.
      DOCKER_HOST: tcp://socket-proxy:2375
      # Admin-only online updates download a GitHub Release runtime artifact,
      # replace /app in-place, and let Docker/Coolify restart this container.
      TOOLPLANE_IMAGE: ${TOOLPLANE_IMAGE:-ghcr.io/asharca/toolplane:latest}
      TOOLPLANE_UPDATE_ENABLED: ${TOOLPLANE_UPDATE_ENABLED:-true}
      TOOLPLANE_UPDATE_REPO: ${TOOLPLANE_UPDATE_REPO:-asharca/ToolPlane}
      TOOLPLANE_UPDATE_ARTIFACT: ${TOOLPLANE_UPDATE_ARTIFACT:-toolplane-runtime-linux-amd64.tar.gz}
      TOOLPLANE_RUNTIME_ROOT: /app
      # These paths are baked into the Docker image. Local `pnpm dev` may still
      # override them through .env when running outside Compose.
      HERMES_ROOT: /opt/hermes-agent
      TOOLPLANE_HERMES_ROOT: /opt/hermes-agent
      TOOLPLANE_PYTHON: /opt/toolplane-hermes-venv/bin/python

volumes:
  mcp_pg:
