services:
  postgres:
    image: postgres:16
    container_name: toolplane-pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: mcp
      POSTGRES_PASSWORD: mcp
      POSTGRES_DB: toolplane
    volumes:
      - mcp_pg:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U mcp -d toolplane']
      interval: 5s
      timeout: 5s
      retries: 10

  # Restricted Docker API proxy. The app launches one hardened container per
  # custom MCP, but never touches the raw socket — it talks to this proxy over
  # TCP, which only exposes the container/image/network endpoints needed. The
  # raw socket is mounted read-only into the proxy alone.
  socket-proxy:
    image: tecnativa/docker-socket-proxy:latest
    restart: unless-stopped
    environment:
      CONTAINERS: 1
      IMAGES: 1
      NETWORKS: 1
      POST: 1
      # everything else stays denied (no volumes/secrets/swarm/exec of host…)
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

  # The app. Coolify should route to this service through its proxy; local host
  # port mappings live in docker-compose.dev.yml.
  app:
    build:
      context: .
      args:
        # NEXT_PUBLIC_* is baked at build time; pass it through to the image.
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
        # Hosted agent messaging runners reuse Hermes adapters bundled in the app image.
        HERMES_REPO: ${HERMES_REPO:-https://github.com/NousResearch/hermes-agent.git}
        HERMES_REF: ${HERMES_REF:-7e8f50a14176e02b514631b0b04470acaadae32a}
        HERMES_ARCHIVE_URL: ${HERMES_ARCHIVE_URL:-}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      socket-proxy:
        condition: service_started
    environment:
      # Internal network → reach Postgres on 5432.
      DATABASE_URL: postgresql://mcp:mcp@postgres:5432/toolplane
      AUTH_SECRET: ${AUTH_SECRET:?set AUTH_SECRET in your environment or .env}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      CONNECTOR_WS_BIND: 0.0.0.0
      CONNECTOR_WS_PORT: ${CONNECTOR_WS_PORT:-9321}
      CONNECTOR_WS_PUBLIC_URL: ${CONNECTOR_WS_PUBLIC_URL:-}
      # Reach the Docker daemon through the restricted proxy, not the raw socket.
      DOCKER_HOST: tcp://socket-proxy:2375
      # These paths are baked into the Docker image. Local `pnpm dev` may still
      # override them through .env when running outside Compose.
      HERMES_ROOT: /opt/hermes-agent
      TOOLPLANE_HERMES_ROOT: /opt/hermes-agent
      TOOLPLANE_PYTHON: /opt/toolplane-hermes-venv/bin/python

volumes:
  mcp_pg:
