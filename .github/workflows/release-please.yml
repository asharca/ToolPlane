name: release-please

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      target_branch:
        description: Branch to release from
        required: true
        default: main
        type: string

permissions:
  contents: write
  issues: write
  pull-requests: write
  packages: write

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-pr:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Open or update release PR
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          target-branch: ${{ inputs.target_branch }}
          skip-github-release: true

  publish:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          skip-github-pull-request: true

      - name: Check out released commit
        if: steps.release.outputs.release_created == 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.release.outputs.sha }}

      - name: Set up pnpm
        if: steps.release.outputs.release_created == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 10.14.0

      - name: Set up Node.js
        if: steps.release.outputs.release_created == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        if: steps.release.outputs.release_created == 'true'
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        if: steps.release.outputs.release_created == 'true'
        run: pnpm exec prisma generate

      - name: Log in to GHCR
        if: steps.release.outputs.release_created == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        if: steps.release.outputs.release_created == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ steps.release.outputs.version }}
            type=raw,value=${{ steps.release.outputs.major }}.${{ steps.release.outputs.minor }}
            type=raw,value=${{ steps.release.outputs.major }}
            type=raw,value=latest

      - name: Set up Buildx
        if: steps.release.outputs.release_created == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build and push release image
        if: steps.release.outputs.release_created == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_APP_URL=${{ vars.NEXT_PUBLIC_APP_URL || 'http://localhost:3000' }}
            TOOLPLANE_VERSION=${{ steps.release.outputs.tag_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build runtime release artifact
        if: steps.release.outputs.release_created == 'true'
        env:
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
          NEXT_PUBLIC_APP_URL: ${{ vars.NEXT_PUBLIC_APP_URL || 'http://localhost:3000' }}
          NEXT_TELEMETRY_DISABLED: 1
          TOOLPLANE_VERSION: ${{ steps.release.outputs.tag_name }}
        run: |
          pnpm build
          rm -rf dist/release
          mkdir -p dist/release/app
          cp -a \
            node_modules \
            .next \
            public \
            package.json \
            next.config.ts \
            scripts \
            prisma \
            prisma.config.ts \
            dist/release/app/
          printf '%s\n' "$TOOLPLANE_VERSION" > dist/release/app/.toolplane-version
          tar -C dist/release -czf toolplane-runtime-linux-amd64.tar.gz app
          shasum -a 256 toolplane-runtime-linux-amd64.tar.gz > toolplane-runtime-linux-amd64.tar.gz.sha256

      - name: Upload release assets
        if: steps.release.outputs.release_created == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ steps.release.outputs.tag_name }}
        run: |
          gh release upload "$TAG_NAME" \
            toolplane-runtime-linux-amd64.tar.gz \
            toolplane-runtime-linux-amd64.tar.gz.sha256 \
            --clobber
