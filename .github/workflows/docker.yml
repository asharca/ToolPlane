name: docker

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4

      # Only push for branch/tag builds — PRs just verify the image builds.
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # NEXT_PUBLIC_APP_URL is baked at build time. Set a repo/Environment
          # variable for production deploys; defaults to localhost otherwise.
          build-args: |
            NEXT_PUBLIC_APP_URL=${{ vars.NEXT_PUBLIC_APP_URL || 'http://localhost:3000' }}
            TOOLPLANE_VERSION=${{ github.ref_type == 'tag' && github.ref_name || github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set up Node for release artifact
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Build release runtime artifact
        if: startsWith(github.ref, 'refs/tags/')
        env:
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
          NEXT_PUBLIC_APP_URL: ${{ vars.NEXT_PUBLIC_APP_URL || 'http://localhost:3000' }}
          NEXT_TELEMETRY_DISABLED: 1
          TOOLPLANE_VERSION: ${{ github.ref_name }}
        run: |
          corepack enable
          corepack prepare pnpm@10.14.0 --activate
          pnpm install --frozen-lockfile
          pnpm exec prisma generate
          pnpm build
          rm -rf dist/release
          mkdir -p dist/release/app
          cp -a \
            node_modules \
            .next \
            public \
            package.json \
            next.config.ts \
            scripts \
            prisma \
            prisma.config.ts \
            dist/release/app/
          printf '%s\n' "$TOOLPLANE_VERSION" > dist/release/app/.toolplane-version
          tar -C dist/release -czf toolplane-runtime-linux-amd64.tar.gz app
          shasum -a 256 toolplane-runtime-linux-amd64.tar.gz > toolplane-runtime-linux-amd64.tar.gz.sha256

      - name: Publish GitHub release artifact
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            toolplane-runtime-linux-amd64.tar.gz
            toolplane-runtime-linux-amd64.tar.gz.sha256
